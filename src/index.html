<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="container">
     <img class="calculator" src="https://img.icons8.com/color/512/apple-calculator.png" alt="Calculator">
    <h1>Calculator</h1>
    <input type="text" class="text" />
    <div class="panel">
      <button id="bracket_left">(</button>
      <button id="bracket_right">)</button>
      <button id="procent">%</button>
      <button id="AC">AC</button>
      <button id="1">1</button>
      <button id="2">2</button>
      <button id="3">3</button>
      <button id="divide">/</button>
      <button id="4">4</button>
      <button id="5">5</button>
      <button id="6">6</button>
      <button id="multiplay">*</button>
      <button id="7">7</button>
      <button id="8">8</button>
      <button id="9">9</button>
      <button id="plus">+</button>
      <button id="del">C</button>
      <button id="0">0</button>
      <button id="dot">.</button>
      <button id="minus">-</button>
      <button id="result">=</button>
    </div>
  </div>
  <div class="container">
    <button class="theme">Switch</button>
    <button class="exit">Exit</button>
  </div>
  <footer>
    <div class="support">
      <a href="" class="icons"><img src="icons/facebook.svg" alt="facebook"></a>
      <a href="" class="icons"><img src="icons/tg.svg" alt="tg"></a>
      <a href="" class="icons"><img src="icons/whatsapp.svg" alt="whatsapp"></a>
    </div>
    <a href="https://maps.app.goo.gl/4cKQVnsuLVUYtmPY8"> Maidan Nezalezhnosti</a>
    <button data-modal id="btn" class="btn">Contact Us:</button>
  </footer>
  <div class="modal">
        <div class="modal__dialog">
            <div class="modal__content">
                <form action="#">
                    <div data-close class="modal__close">&times;</div>
                    <div class="modal__title">We will contact you as soon as possible!</div>
                    <input required placeholder="Your name:" name="name" type="text" class="modal__input">
                    <input required placeholder="your number" name="phone" type="phone" class="modal__input">
                    <button class="btn btn_dark btn_min">Call me</button>
                </form>
            </div>
        </div>
    </div>
  <script src="JS/script.js"></script>
</body>
</html>
